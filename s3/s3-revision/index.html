<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>validation des formulaires en JS</title>
  </head>
  <body>
    <form action="https://www.google.com/" method="get" id="mon_form">
      <input type="text" name="" id="nom" placeholder="Entrer votre nom" />
      <input type="text" name="" id="prenom" placeholder="Entrer votre prenom" />
      <div id="erreur"></div>
      <button type="button" onclick="verifier_tout()">Valider</button>
    </form>
    <style>
      .e {
        border: 2px solid red;
      }
    </style>
  </body>
  <script>

    let i=10;

    // i+=20;//i=i+20
    //concatenation ( colle)
    // let x ="salut";
    // x+=" ali";
    // x+=" ali";
    // console.log(x);


    //variable globale
    let balise_form = document.getElementById("mon_form");
    let div_erreur = document.getElementById("erreur");
    function verifier_nom() {
      let champ_input = document.getElementById("nom");
      //recuperer l'input
      //variable locale

      // si sa valeur est vide (pas de valeur)
      if (champ_input.value == "") {
        // alert("le nom est obligatoire");
        div_erreur.innerHTML = "le nom est obligatoire";
        div_erreur.style.color = "red";

        champ_input.className = "e";
      } 
    }


    function verifier_prenom() {
      //recuperer l'input
      let champ_input = document.getElementById("prenom");

      // si sa valeur est vide (pas de valeur)
      if (champ_input.value == "") {
        // alert("le nom est obligatoire");
        div_erreur.innerHTML += "<br>le prenom est obligatoire";
        div_erreur.style.color = "red";

        champ_input.className = "e";
      } 
    }

    function verifier_tout() {
      //effacer les anciens messages ( vider)
      div_erreur.innerHTML="";

      verifier_nom();
      verifier_prenom();
      
      if (div_erreur.innerHTML=="") {
        balise_form.submit();
      }

    }
  
  </script>
</html>
